app = 'face-swap'
primary_region = 'gru'

[build]

[env]
  FACE_SWAP_CTX_ID = '-1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 4
    soft_limit = 2

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2

# Persistent volume for the model file.
# On first deploy Fly will create this volume automatically.
# After first deploy, upload the model once:
#   fly ssh sftp put models/inswapper_128.onnx /app/models/inswapper_128.onnx
[[mounts]]
  source = 'face_swap_models'
  destination = '/app/models'
  initial_size = '2'
